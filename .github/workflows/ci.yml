name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN || '' }}
      CODESCENE_CLI_SHA256: ${{ vars.CODESCENE_CLI_SHA256 || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0
      - uses: leynos/shared-actions/.github/actions/setup-rust@d3cbe87e745e07b3ad53ddcb87deb19ffa95c9b8
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@848136c5ba4ea848a76ce75b8babe954359c4381
        with:
          tool: cargo-nextest
      - name: Check formatting
        run: make check-fmt
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Generate coverage
        # Coverage is only needed for the pull-request changed-line gate
        # (deferred below); once coverage-main.yml exists, generating it
        # again on the push-to-main trigger would be redundant.
        if: github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/generate-coverage@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
        with:
          output-path: lcov.info
          format: lcov
          features: test-support
          use-cargo-nextest: 'true'
          with-ratchet: 'true'
      # The `mode: check` step is deliberately not wired in yet: CodeScene
      # project 70674 has no coverage-gates configuration, so
      # `cs-coverage check` fails every run with "HTTP call succeeded,
      # but the received project-config isn't valid. Lacks the gates
      # configuration." — a CodeScene-side per-project setting, not a CI
      # defect (ddlint and chutoro hit the byte-identical error). Add the
      # check step in a fast-follow PR once coverage-main.yml has
      # uploaded to main at least once and the gate is confirmed to
      # resolve, or once CodeScene confirms the project's coverage gate
      # is enabled.
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: '**/*.md'
      - name: Install uv
        id: setup-uv
        # v6.4.3
        uses: astral-sh/setup-uv@b75a909f75acd358c2196fb9a5f1299a9a8868a4
        with:
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
      - name: Workflow contract tests
        run: make test-workflow-contracts
      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.2.21"
      - name: Install and verify Mermaid CLI
        run: |
          set -euxo pipefail
          bun install --global @mermaid-js/mermaid-cli@11.9.0
          bun x puppeteer browsers install chrome-headless-shell
          mmdc --version
      - name: Install diagram tooling
        run: |
          set -euxo pipefail
          uv tool install nixie-cli
          cargo binstall --locked --no-confirm merman-cli
      - name: Validate diagrams
        run: make nixie
      - name: Debug CLI versions
        if: ${{ failure() }}
        run: |
          set -euxo pipefail
          which mmdc
          mmdc --version
          bun --version

  feature-matrix:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: explicit-defaults
            test_flags: "--no-default-features --features solver-vrp,store-sqlite"
          - name: no-default-features
            test_flags: "--no-default-features"
          - name: all-features
            test_flags: "--all-features"
          - name: solver-vrp-only
            test_flags: "--no-default-features --features solver-vrp"
          - name: solver-ortools-only
            test_flags: "--no-default-features --features solver-ortools"
          - name: store-sqlite-only
            test_flags: "--no-default-features --features store-sqlite"
          - name: solvers-only
            test_flags: "--no-default-features --features solver-vrp,solver-ortools"
          - name: solver-ortools-and-store
            test_flags: "--no-default-features --features solver-ortools,store-sqlite"
    steps:
      # Intentional duplication with the build job keeps the matrix
      # self-contained; refactor to a composite action if this grows.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      - uses: leynos/shared-actions/.github/actions/setup-rust@d3cbe87e745e07b3ad53ddcb87deb19ffa95c9b8
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@848136c5ba4ea848a76ce75b8babe954359c4381
        with:
          tool: cargo-nextest
      - name: Test (${{ matrix.name }})
        run: |
          echo "TEST_FLAGS=${TEST_FLAGS}"
          make test
        env:
          TEST_FLAGS: ${{ matrix.test_flags }}
