name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN || '' }}
      CODESCENE_CLI_SHA256: ${{ vars.CODESCENE_CLI_SHA256 || '' }}
      MERMAN_CLI_VERSION: '0.7.0'
      WHITAKER_INSTALLER_VERSION: '0.2.6'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0
      - uses: leynos/shared-actions/.github/actions/setup-rust@d3cbe87e745e07b3ad53ddcb87deb19ffa95c9b8
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@848136c5ba4ea848a76ce75b8babe954359c4381
        with:
          tool: cargo-nextest
      - name: Check formatting
        run: make check-fmt
      - name: Cache whitaker-installer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install the Whitaker Dylint suite
        run: |
          set -euo pipefail
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Generate coverage
        # Coverage is only needed for the pull-request changed-line gate
        # (deferred below); once coverage-main.yml exists, generating it
        # again on the push-to-main trigger would be redundant.
        if: github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/generate-coverage@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
        with:
          output-path: lcov.info
          format: lcov
          features: test-support
          use-cargo-nextest: 'true'
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/70674
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: '**/*.md'
      - name: Install uv
        id: setup-uv
        # v6.4.3
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          python-version: '3.14'
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
      - name: Enforce en-GB-oxendict spelling
        run: make spelling
      - name: Workflow contract tests
        run: make test-workflow-contracts
      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.2.21"
      - name: Install and verify Mermaid CLI
        run: |
          set -euxo pipefail
          bun install --global @mermaid-js/mermaid-cli@11.9.0
          bun x puppeteer browsers install chrome-headless-shell
          mmdc --version
      - name: Install diagram tooling
        run: |
          set -euxo pipefail
          rustup toolchain install 1.95.0 --profile minimal
          uv tool install --python 3.14 nixie-cli==1.1.0
          cargo +1.95.0 install merman-cli \
            --version "=${MERMAN_CLI_VERSION}" --locked
      - name: Validate diagrams
        run: make nixie
      - name: Debug CLI versions
        if: ${{ failure() }}
        run: |
          set -euxo pipefail
          which mmdc
          mmdc --version
          bun --version

  feature-matrix:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: explicit-defaults
            test_flags: "--no-default-features --features solver-vrp,store-sqlite"
          - name: no-default-features
            test_flags: "--no-default-features"
          - name: all-features
            test_flags: "--all-features"
          - name: solver-vrp-only
            test_flags: "--no-default-features --features solver-vrp"
          - name: solver-ortools-only
            test_flags: "--no-default-features --features solver-ortools"
          - name: store-sqlite-only
            test_flags: "--no-default-features --features store-sqlite"
          - name: solvers-only
            test_flags: "--no-default-features --features solver-vrp,solver-ortools"
          - name: solver-ortools-and-store
            test_flags: "--no-default-features --features solver-ortools,store-sqlite"
    steps:
      # Intentional duplication with the build job keeps the matrix
      # self-contained; refactor to a composite action if this grows.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      - uses: leynos/shared-actions/.github/actions/setup-rust@d3cbe87e745e07b3ad53ddcb87deb19ffa95c9b8
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@848136c5ba4ea848a76ce75b8babe954359c4381
        with:
          tool: cargo-nextest
      - name: Test (${{ matrix.name }})
        run: |
          echo "TEST_FLAGS=${TEST_FLAGS}"
          make test
        env:
          TEST_FLAGS: ${{ matrix.test_flags }}
